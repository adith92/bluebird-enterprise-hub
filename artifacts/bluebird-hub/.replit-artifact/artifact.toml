kind = "web"
previewPath = "/"
title = "Bluebird B2B Enterprise Hub"
version = "1.0.0"
id = "artifacts/bluebird-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20670

[services.development]
run = "pnpm --filter @workspace/bluebird-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bluebird-hub", "run", "build" ]
publicDir = "artifacts/bluebird-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20670"
BASE_PATH = "/"
